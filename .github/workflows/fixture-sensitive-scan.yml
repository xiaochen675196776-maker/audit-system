name: Repository Sensitive Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  sensitive-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run repository sensitive data scanner
        run: |
          python scripts/check_sensitive_fixture.py --strict --root .
      - name: Install backend test deps
        working-directory: backend
        run: |
          # §10 仅装了 sqlalchemy/aiosqlite/pytest/pytest-asyncio，遗漏 pydantic
          # 与 pydantic-settings，导致 conftest.py → app.core.config 触发 ImportError。
          # 改为按 backend/requirements.txt 全量装，对齐 backend-integration-tests.yml。
          pip install -r requirements.txt
          pip install pytest-asyncio
      - name: Run sensitive scan tests
        working-directory: backend
        run: |
          pytest tests/test_task_094a_fixture_governance.py tests/test_task_095a_repository_sensitive_scan.py -v --tb=short
        env:
          DATABASE_URL: sqlite+aiosqlite:///./_test_sensitive.db
