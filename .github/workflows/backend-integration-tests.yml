name: Backend Integration Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || pip install -e .
          pip install asyncpg
      - name: Run integration tests
        working-directory: backend
        run: |
          # 当前项目没有 @pytest.mark.integration 标记的测试。
          # 改用：1) 真 DB (Postgres) 跑后端测试；2) 排除不能在 Postgres 上跑的大型 e2e。
          pytest tests/ \
            --ignore=tests/test_anchor_inheritance_regression.py \
            --ignore=tests/test_task_093_real_regression.py \
            --tb=short -q --no-header