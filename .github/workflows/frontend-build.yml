name: Frontend Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        # 与 frontend-vitest.yml 同因：package-lock.json 含
        # @esbuild/netbsd-arm64@0.28.1，npm ci 在 linux x64 报 EBADPLATFORM。
        # 改 npm install 让其跳过不匹配平台的 optionalDependencies。
        run: npm install --no-audit --no-fund --include=optional
      - name: Type check (vue-tsc)
        working-directory: frontend
        run: npm run type-check
      - name: Build (vite)
        working-directory: frontend
        run: npm run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
          if-no-files-found: ignore